def _decode_base64url_nopad(value: str) -> bytes:
    s = value.strip()
    s += "=" * ((4 - len(s) % 4) % 4)
    return base64.urlsafe_b64decode(s.encode())


def valid_reality_public_key(value: str) -> bool:
    if not value or not re.fullmatch(r"[A-Za-z0-9_-]{43,44}", value.strip()):
        return False
    try:
        raw = _decode_base64url_nopad(value.strip())
    except Exception:
        return False
    return len(raw) == 32


